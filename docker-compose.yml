# ============================================================
#  Docker Compose — Cloud Compliance Platform
#  Full stack: Nginx (TLS), API, Frontend, PostgreSQL, Redis,
#              MinIO, OPA, Celery
#
#  Security hardened:
#    - All internal services have NO host port bindings
#    - Only nginx is exposed on 80/443
#    - APP_ENV=production disables API docs
# ============================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ---- JWT Key Init (one-shot) ----
  # Copies JWT RSA keys from the NTFS bind mount into a named Docker volume
  # with correct Linux permissions so the backend non-root user can read them.
  jwt_key_init:
    image: alpine:3.19
    container_name: compliance_jwt_key_init
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Copying JWT keys into named volume..."
        cp /src/jwt_private.pem /keys/jwt_private.pem
        cp /src/jwt_public.pem  /keys/jwt_public.pem
        chown 999:999 /keys/jwt_private.pem /keys/jwt_public.pem
        chmod 640 /keys/jwt_private.pem   # private key: appuser read only
        chmod 644 /keys/jwt_public.pem    # public key: world-readable
        echo "Done — JWT keys ready in volume."
    volumes:
      - ./backend/keys:/src:ro   # NTFS bind mount (alpine root — OK)
      - jwt_keys:/keys           # named Docker volume (Linux fs — chmod works)
    networks:
      - compliance_net

  # ---- TLS Reverse Proxy (only service with host ports) ----
  nginx:
    image: nginx:1.27-alpine
    container_name: compliance_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - compliance_net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---- Backend API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: compliance_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - OPA_URL=${OPA_URL}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/compliance-reader-9818c46a758f.json
      - APP_ENV=production
      # MISP TLS: set MISP_CA_CERT=/app/secrets/misp_ca.pem in .env if your MISP
      # instance uses a self-signed or private-CA certificate. The secrets/ directory
      # is already mounted at /app/secrets below — place the PEM cert file there.
      - MISP_CA_CERT=${MISP_CA_CERT:-}
    # NO ports: — only reachable via nginx on compliance_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_started
      minio:
        condition: service_healthy
      jwt_key_init:
        condition: service_completed_successfully   # wait for JWT keys to be in volume
    volumes:
      - ./backend/policies:/app/policies:rw
      - ./backend/tests:/app/tests:ro
      - ./secrets:/app/secrets:ro
      - ./opa/policies:/app/opa_policies:rw
      - opa_ca_cert:/app/certs:ro      # CA cert only — backend verifies OPA TLS, never sees private key
      - jwt_keys:/app/keys:ro              # named volume — Linux permissions, appuser can read
    networks:
      - compliance_net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # ---- Celery Worker (Background Scanning) ----
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: compliance_celery
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/compliance-reader-9818c46a758f.json
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/policies:/app/policies:rw
      - ./secrets:/app/secrets:ro
      - opa_ca_cert:/app/certs:ro      # CA cert to verify OPA TLS during scans
    networks:
      - compliance_net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # celery inspect ping verifies the worker is alive and connected to the broker
      test: ["CMD-SHELL", "celery -A app.core.celery_app inspect ping -d celery@$$HOSTNAME --timeout 10 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ---- Celery Beat (Scheduler) ----
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: compliance_celery_beat
    restart: unless-stopped
    command: celery -A app.core.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    env_file: .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/compliance-reader-9818c46a758f.json
    depends_on:
      - celery_worker
    networks:
      - compliance_net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # pgrep not available in slim image — use Python to check /proc for the beat process
      test: ["CMD-SHELL", "python -c \"import os,sys; procs=[open(f'/proc/{p}/cmdline').read() for p in os.listdir('/proc') if p.isdigit() and os.path.exists(f'/proc/{p}/cmdline')]; sys.exit(0 if any('beat' in p for p in procs) else 1)\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---- Frontend Dashboard ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: compliance_frontend
    restart: unless-stopped
    # NO ports: — only reachable via nginx on compliance_net
    depends_on:
      - backend
    networks:
      - compliance_net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: compliance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # NO ports: — internal only; use 'docker exec' for direct DB access
    networks:
      - compliance_net
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: compliance_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --loglevel warning
    volumes:
      - redis_data:/data
    # NO ports: — internal only
    networks:
      - compliance_net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ---- MinIO (Evidence Object Storage) ----
  minio:
    image: minio/minio:latest
    container_name: compliance_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    # NO ports: — internal only; console accessible via 'docker exec'
    networks:
      - compliance_net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  # ---- OPA Cert Init (one-shot) ----
  # Copies TLS certs from the NTFS bind mount into a named Docker volume
  # with correct Linux permissions so OPA's non-root user can read them.
  # Runs once and exits — OPA waits for this to complete before starting.
  opa_cert_init:
    image: alpine:3.19
    container_name: compliance_opa_cert_init
    restart: "no"            # one-shot: run once, do not restart
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Populating OPA cert volumes..."
        # opa_certs: full keypair for OPA's TLS server
        cp /src/cert.pem /certs/cert.pem
        cp /src/key.pem  /certs/key.pem
        chown 999:999 /certs/cert.pem /certs/key.pem
        chmod 644 /certs/cert.pem
        chmod 600 /certs/key.pem        # private key: OPA non-root user only
        # opa_ca_cert: public cert only — backend uses this to verify OPA's TLS
        # The private key MUST NOT be present in this volume.
        cp /src/cert.pem /ca/cert.pem
        chown 999:999 /ca/cert.pem
        chmod 644 /ca/cert.pem
        echo "Done — OPA keypair in opa_certs, CA cert only in opa_ca_cert."
    volumes:
      - ./nginx/certs:/src:ro   # NTFS bind mount (alpine runs as root — OK)
      - opa_certs:/certs        # keypair for OPA's TLS server
      - opa_ca_cert:/ca         # public cert only — backend CA trust store
    networks:
      - compliance_net

  # ---- Open Policy Agent ----
  opa:
    image: openpolicyagent/opa:latest-static
    container_name: compliance_opa
    restart: unless-stopped
    depends_on:
      opa_cert_init:
        condition: service_completed_successfully   # wait for certs to be copied
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --tls-cert-file=/certs/cert.pem
      - --tls-private-key-file=/certs/key.pem
      - --log-level=info
      - --log-format=json
      - /policies
    volumes:
      - ./opa/policies:/policies:ro
      - opa_certs:/certs:ro            # named volume — Linux permissions, OPA can read
    # NO ports: — internal only, isolated on compliance_net
    networks:
      - compliance_net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    # No healthcheck: openpolicyagent/opa:latest-static is a scratch image
    # (no shell, no wget, no curl) — use service_started in dependents.

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  opa_certs:
    driver: local   # OPA TLS keypair (cert + private key)
  opa_ca_cert:
    driver: local   # OPA CA cert only — no private key; safe to mount into backend
  jwt_keys:
    driver: local   # JWT RSA keypair — chown 999:999 by jwt_key_init

networks:
  compliance_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
