# ============================================================
#  Docker Compose — Cloud Compliance Platform
#  Full stack: API, Frontend, PostgreSQL, Redis, MinIO, OPA, Celery
# ============================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---- Backend API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: compliance_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - OPA_URL=${OPA_URL}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/compliance-reader-9818c46a758f.json
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opa:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./backend/policies:/app/policies:rw
      - ./backend/tests:/app/tests:ro
      - ./secrets:/app/secrets:ro
      - ./opa/policies:/app/opa_policies:rw
    networks:
      - compliance_net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # ---- Celery Worker (Background Scanning) ----
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: compliance_celery
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/compliance-reader-9818c46a758f.json
    depends_on:
      - backend
      - redis
      - postgres
    volumes:
      - ./backend/policies:/app/policies:rw
      - ./secrets:/app/secrets:ro
    networks:
      - compliance_net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # ---- Celery Beat (Scheduler) ----
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: compliance_celery_beat
    restart: unless-stopped
    command: celery -A app.core.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    env_file: .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/compliance-reader-9818c46a758f.json
    depends_on:
      - celery_worker
    networks:
      - compliance_net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # ---- Frontend Dashboard ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: compliance_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - compliance_net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: compliance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - compliance_net
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: compliance_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - compliance_net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ---- MinIO (Evidence Object Storage) ----
  minio:
    image: minio/minio:latest
    container_name: compliance_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - compliance_net
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  # ---- Open Policy Agent ----
  opa:
    image: openpolicyagent/opa:latest-static
    container_name: compliance_opa
    restart: unless-stopped
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - --log-format=json
      - /policies
    volumes:
      - ./opa/policies:/policies:ro
    ports:
      - "8181:8181"
    networks:
      - compliance_net
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  compliance_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
