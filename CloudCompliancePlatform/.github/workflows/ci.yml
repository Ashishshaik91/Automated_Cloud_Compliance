name: CI — Cloud Compliance Platform

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ---- Backend Checks ----
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dev dependencies
        run: pip install ruff mypy pydantic pydantic-settings
      - name: Lint with ruff
        run: ruff check app/ tests/
      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports --no-error-summary

  backend-audit:
    name: Security Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Audit dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969

  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      APP_SECRET_KEY: "ci-test-secret-key-at-least-64-characters-long-for-testing-purposes"
      JWT_SECRET_KEY: "ci-test-jwt-key-which-is-also-at-least-32-characters-long-yeah"
      DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
      REDIS_URL: "redis://localhost:6379/0"
      CELERY_BROKER_URL: "redis://localhost:6379/1"
      CELERY_RESULT_BACKEND: "redis://localhost:6379/2"
      POSTGRES_PASSWORD: "test"
      REDIS_PASSWORD: "test"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=app --cov-report=xml --cov-fail-under=60
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
        continue-on-error: true

  # ---- Frontend Checks ----
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --frozen-lockfile
      - name: Build
        run: npm run build

  # ---- Docker Build ----
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Copy env file
        run: cp .env.example .env
      - name: Build backend image
        run: docker build -t compliance-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t compliance-frontend:ci ./frontend
