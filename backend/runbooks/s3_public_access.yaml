rule_id: s3_public_access
title: Block S3 Bucket Public Access
severity: critical
automated: true
framework_version: "PCI-DSS v4.0 / CIS AWS v2.0"
last_verified: "2026-01"
manual_steps:
  - "Open AWS S3 console."
  - "Select the non-compliant bucket."
  - "Click 'Permissions' → 'Block public access (bucket settings)' → 'Edit'."
  - "Check all four options and click 'Save changes'."
  - "Confirm by typing 'confirm' in the dialog."
aws_cli_command: |
  aws s3api put-public-access-block \
    --bucket {resource_id} \
    --public-access-block-configuration \
      "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
rollback_command: |
  aws s3api put-public-access-block \
    --bucket {resource_id} \
    --public-access-block-configuration \
      "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false"
references:
  - "https://docs.aws.amazon.com/AmazonS3/latest/userguide/access-control-block-public-access.html"
