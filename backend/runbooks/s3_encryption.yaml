rule_id: s3_encryption
title: Enable S3 Bucket Default Encryption
severity: high
automated: true
framework_version: "PCI-DSS v4.0 / CIS AWS v2.0"
last_verified: "2026-01"
manual_steps:
  - "Open the AWS S3 console."
  - "Select the non-compliant bucket."
  - "Click 'Properties' → 'Default encryption' → 'Edit'."
  - "Select 'Server-side encryption with Amazon S3 managed keys (SSE-S3)' or 'SSE-KMS'."
  - "Click 'Save changes'."
aws_cli_command: |
  aws s3api put-bucket-encryption \
    --bucket {resource_id} \
    --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
rollback_command: |
  aws s3api delete-bucket-encryption --bucket {resource_id}
references:
  - "https://docs.aws.amazon.com/AmazonS3/latest/userguide/default-bucket-encryption.html"
  - "https://www.cisecurity.org/benchmark/amazon_web_services"
