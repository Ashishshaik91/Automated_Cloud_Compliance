name: "OWASP Top 10"
policies:
  - id: owasp-s3-public-exposure
    name: "Sensitive Data Publicly Exposed (A01:2021)"
    resource_type: "s3_bucket"
    opa_package: "compliance.generic"
    severity: "critical"
    rules:
      - field: "public_access_blocked"
        operator: "is_true"

  - id: owasp-s3-encryption
    name: "Cryptographic Failures - Unencrypted Storage (A02:2021)"
    resource_type: "s3_bucket"
    opa_package: "compliance.generic"
    severity: "high"
    rules:
      - field: "encryption_enabled"
        operator: "is_true"

  - id: owasp-iam-no-mfa
    name: "Broken Authentication - No MFA (A07:2021)"
    resource_type: "iam_user"
    opa_package: "compliance.generic"
    severity: "critical"
    rules:
      - field: "mfa_enabled"
        operator: "is_true"

  - id: owasp-cloudtrail-logging
    name: "Security Logging & Monitoring Failures (A09:2021)"
    resource_type: "cloudtrail"
    opa_package: "compliance.generic"
    severity: "high"
    rules:
      - field: "is_logging"
        operator: "is_true"

  - id: owasp-ec2-public-ip
    name: "Insecure Design - Public EC2 Exposure (A04:2021)"
    resource_type: "ec2_instance"
    opa_package: "compliance.generic"
    severity: "high"
    rules:
      - field: "is_public"
        operator: "is_false"
