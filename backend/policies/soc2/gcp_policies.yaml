# ============================================================
#  SOC 2 Type II Compliance Policies for GCP
# ============================================================

policies:
  # CC6.7 — Restrict Transmission of Confidential Information
  - id: soc2-gcs-no-public
    name: "SOC2 CC6.7: GCP Storage buckets must not allow public access"
    resource_type: gcs_bucket
    framework: soc2
    severity: high
    opa_package: "compliance.generic"
    rules:
      - field: public_access_blocked
        operator: is_true
    remediation: "Enable Public Access Prevention on the GCS bucket."
    reference: "SOC 2 CC6.7"

  # CC6.1 — Logical Access / Uniform Bucket Level Access
  - id: soc2-gcs-uniform-access
    name: "SOC2 CC6.1: GCP Storage must use Uniform Bucket-Level Access"
    resource_type: gcs_bucket
    framework: soc2
    severity: medium
    opa_package: "compliance.generic"
    rules:
      - field: uniform_bucket_level_access
        operator: is_true
    remediation: "Enable Uniform Bucket-Level Access to enforce consistent IAM policies."
    reference: "SOC 2 CC6.1"

  # CC6.6 — Secure Configurations (Shielded VMs)
  - id: soc2-gcp-shielded-vm
    name: "SOC2 CC6.6: GCP Compute instances must be Shielded VMs"
    resource_type: gcp_compute_instance
    framework: soc2
    severity: medium
    opa_package: "compliance.generic"
    rules:
      - field: shielded_vm
        operator: is_true
    remediation: "Enable Shielded VM features (Secure Boot, vTPM) for Compute Engine."
    reference: "SOC 2 CC6.6"

  # CC6.1 — Encryption in transit
  - id: soc2-gcp-sql-require-ssl
    name: "SOC2 CC6.1: GCP Cloud SQL must enforce SSL/TLS connections"
    resource_type: gcp_cloud_sql
    framework: soc2
    severity: high
    opa_package: "compliance.generic"
    rules:
      - field: ip_configuration_require_ssl
        operator: is_true
    remediation: "Enforce 'Require SSL' on Cloud SQL connections."
    reference: "SOC 2 CC6.1"

  # A1.2 — Availability (Backups)
  - id: soc2-gcp-sql-backup
    name: "SOC2 A1.2: GCP Cloud SQL must have automated backups enabled"
    resource_type: gcp_cloud_sql
    framework: soc2
    severity: medium
    opa_package: "compliance.generic"
    rules:
      - field: backup_enabled
        operator: is_true
    remediation: "Ensure automated daily backups are enabled for Cloud SQL."
    reference: "SOC 2 A1.2"

  # CC6.1 — IAM Security
  - id: soc2-gcp-iam-no-public
    name: "SOC2 CC6.1: GCP Project IAM must not contain public bindings"
    resource_type: gcp_iam_policy
    framework: soc2
    severity: critical
    opa_package: "compliance.generic"
    rules:
      - field: has_public_bindings
        operator: is_false
    remediation: "Remove 'allUsers' or 'allAuthenticatedUsers' from project-level IAM roles."
    reference: "SOC 2 CC6.1"
