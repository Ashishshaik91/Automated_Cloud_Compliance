# ============================================================
#  SOC 2 Type II Compliance Policies for Azure
# ============================================================

policies:
  # CC6.7 — Restrict Transmission of Confidential Information
  - id: soc2-azure-storage-no-public
    name: "SOC2 CC6.7: Azure Storage accounts must not allow public access"
    resource_type: azure_storage_account
    framework: soc2
    severity: high
    opa_package: "compliance.generic"
    rules:
      - field: allow_blob_public_access
        operator: is_false
    remediation: "Disable public blob access on the Azure Storage Account."
    reference: "SOC 2 CC6.7"

  # CC6.1 — Encryption of data in transit and at rest
  - id: soc2-azure-storage-encryption
    name: "SOC2 CC6.1: Azure Storage data at rest must be encrypted"
    resource_type: azure_storage_account
    framework: soc2
    severity: high
    opa_package: "compliance.generic"
    rules:
      - field: encryption_enabled
        operator: is_true
    remediation: "Enable server-side encryption for Azure Storage."
    reference: "SOC 2 CC6.1"

  # CC6.1 — Encryption in transit
  - id: soc2-azure-storage-https
    name: "SOC2 CC6.1: Azure Storage traffic must use HTTPS only"
    resource_type: azure_storage_account
    framework: soc2
    severity: medium
    opa_package: "compliance.generic"
    rules:
      - field: https_only
        operator: is_true
    remediation: "Configure Azure Storage Account to accept HTTPS traffic only."
    reference: "SOC 2 CC6.1"

  # CC6.6 — Logical Access from External Sources
  - id: soc2-azure-sql-no-public
    name: "SOC2 CC6.6: Azure SQL Server must not be publicly accessible"
    resource_type: azure_sql_server
    framework: soc2
    severity: high
    opa_package: "compliance.generic"
    rules:
      - field: public_network_access
        operator: is_false
