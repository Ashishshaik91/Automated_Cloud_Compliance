name: "NIST SP 800-53"
policies:
  - id: nist-audit-logging
    name: "Audit Logging Enabled (AU-2)"
    resource_type: "cloudtrail"
    opa_package: "compliance.generic"
    severity: "high"
    rules:
      - field: "is_logging"
        operator: "is_true"

  - id: nist-s3-encryption
    name: "Data at Rest Encryption (SC-28)"
    resource_type: "s3_bucket"
    opa_package: "compliance.generic"
    severity: "critical"
    rules:
      - field: "encryption_enabled"
        operator: "is_true"

  - id: nist-s3-public-access
    name: "Restrict Public Access (AC-3)"
    resource_type: "s3_bucket"
    opa_package: "compliance.generic"
    severity: "critical"
    rules:
      - field: "public_access_blocked"
        operator: "is_true"

  - id: nist-iam-mfa
    name: "Authenticator Management (IA-5)"
    resource_type: "iam_user"
    opa_package: "compliance.generic"
    severity: "critical"
    rules:
      - field: "mfa_enabled"
        operator: "is_true"

  - id: nist-cloudtrail-multiregion
    name: "Multi-Region Audit Trail (AU-12)"
    resource_type: "cloudtrail"
    opa_package: "compliance.generic"
    severity: "high"
    rules:
      - field: "multi_region"
        operator: "is_true"
