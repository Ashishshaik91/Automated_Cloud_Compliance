name: "CIS Benchmarks"
policies:
  - id: cis-root-mfa
    name: "Avoid Root usage & ensure MFA"
    resource_type: "iam_user"
    opa_package: "compliance.generic"
    severity: "critical"
    rules:
      - field: "mfa_enabled"
        operator: "is_true"

  - id: cis-iam-no-active-keys
    name: "No Excessive Active Access Keys"
    resource_type: "iam_user"
    opa_package: "compliance.generic"
    severity: "high"
    rules:
      - field: "active_key_count"
        operator: "equals"
        value: 0

  - id: cis-s3-encryption
    name: "S3 Bucket Encryption Enabled"
    resource_type: "s3_bucket"
    opa_package: "compliance.generic"
    severity: "high"
    rules:
      - field: "encryption_enabled"
        operator: "is_true"

  - id: cis-s3-public-access
    name: "S3 Bucket Public Access Blocked"
    resource_type: "s3_bucket"
    opa_package: "compliance.generic"
    severity: "critical"
    rules:
      - field: "public_access_blocked"
        operator: "is_true"

  - id: cis-cloudtrail-log-validation
    name: "CloudTrail Log File Validation"
    resource_type: "cloudtrail"
    opa_package: "compliance.generic"
    severity: "high"
    rules:
      - field: "log_file_validation"
        operator: "is_true"
