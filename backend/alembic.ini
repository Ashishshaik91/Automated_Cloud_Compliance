# Alembic configuration file for Cloud Compliance Platform.
# Manages schema migrations against the PostgreSQL database.

[alembic]
# Path to the migrations directory
script_location = alembic

# Template used to generate migration file names:
# %(rev)s    - revision ID
# %(slug)s   - descriptive slug (based on message)
# %(epoch)s  - seconds since epoch
file_template = %%(epoch)s_%%(rev)s_%%(slug)s

# sys.path additions
prepend_sys_path = .

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
