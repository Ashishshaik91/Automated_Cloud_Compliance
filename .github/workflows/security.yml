name: Security Scanning

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  secret-scan:
    name: Secret Scanner (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks-action
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python pip-audit
        run: |
          pip install pip-audit
          # Report vulnerabilities but do not block the pipeline on transitive issues
          pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-2024-83 || true
          pip-audit -r backend/requirements.txt --exit-zero

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Node npm audit
        working-directory: ./frontend
        # Report high/critical issues but do not block on transitive dependency findings
        run: npm audit --audit-level=critical || true

  container-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t compliance-backend:local ./backend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'compliance-backend:local'
          format: 'table'
          # Report only — do not fail the build on unfixed OS/library CVEs
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
