# ============================================================
#  nginx/nginx.conf — TLS Reverse Proxy
#  Cloud Compliance Platform
#
#  Terminates TLS for both frontend (React) and backend (FastAPI).
#  HTTP → HTTPS redirect on port 80.
#  WebSocket upgrade support for /api/v1/ws/.
#
#  To use with Let's Encrypt in production:
#    - Replace ssl_certificate paths with /etc/letsencrypt/live/<domain>/...
#    - Zero other changes required.
# ============================================================

# ---- Rate limiting zones (nginx-level, belt-and-suspenders with slowapi) ----
limit_req_zone $binary_remote_addr zone=api_zone:20m   rate=60r/m;
limit_req_zone $binary_remote_addr zone=ws_zone:5m     rate=10r/m;
# Login-specific zone (lower threshold)
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;

# ---- HTTP: redirect everything to HTTPS ----
server {
    listen 80;
    server_name _;

    # Docker health check — must be on HTTP (port 80) before the TLS redirect
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: main TLS termination ----
server {
    listen 443 ssl;
    http2  on;
    server_name _;

    # --- TLS Certificates ---
    # Self-signed for local dev (generated by scripts/gen_certs.sh)
    # Swap for Let's Encrypt / ACM cert in production — no other changes needed.
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # --- TLS Protocol & Cipher Hardening ---
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- Security Headers (belt-and-suspenders with backend middleware) ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP — no unsafe-inline; explicit WebSocket and HTTPS origins
    # NOTE: These values must be updated to the real production domain before go-live.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' wss://localhost https://localhost; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;

    # --- Gzip ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # --- Backend API Proxy ---
    location /api/v1/auth/login {
        limit_req zone=login_zone burst=3 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    location /api/ {
        limit_req zone=api_zone burst=30 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # --- WebSocket: live event feed ---
    location /api/v1/ws/ {
        limit_req zone=ws_zone burst=5 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $http_host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600;
    }

    # --- Health check (nginx-level, no backend needed) ---
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # --- Frontend SPA ---
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $http_host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
